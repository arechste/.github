name: Feature Request
description: Suggest a new feature or enhancement
title: "feat: "
labels: ["type/feature"]
assignees: ["arechste"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see? Why is this useful?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered or workarounds you're using.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, examples, or related issues.

name: Bug Report
description: Report a bug or unexpected behavior
title: "fix: "
labels: ["type/fix"]
assignees: ["arechste"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Run '...'
        2. Click on '...'
        3. See error

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, environment details, or related issues.
